<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>냉장고 셰프</title>
    <meta name="description" content="냉장고 재료를 넣으면 요리가 나옵니다. 91,000+ 레시피 검색.">
    <meta name="theme-color" content="#1a1612">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800&family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-inner">
                <h1 class="logo">
                    <span class="logo-icon">🧊</span>
                    <span class="logo-text">냉장고 셰프</span>
                </h1>
                <p class="tagline">냉장고 재료를 넣으면, 요리가 나옵니다</p>
                <div class="header-badges">
                    <div class="db-badge">📚 레시피 <strong id="recipeCount">-</strong>개</div>
                    <button id="favFilterBtn" class="fav-filter-btn" title="즐겨찾기">⭐ <span id="favCount"></span></button>
                    <button id="shoppingToggleBtn" class="shopping-toggle-btn" title="장보기 목록">🛒 <span id="shoppingCount"></span></button>
                </div>
            </div>
        </header>

        <main class="main">
            <div id="loading" class="empty-state">
                <div class="empty-icon">⏳</div>
                <p>레시피 데이터 로딩 중...</p>
                <div id="loadProgress" style="font-size:0.8rem;color:var(--text-muted);margin-top:0.5rem"></div>
            </div>

            <section id="searchSection" class="search-section" style="display:none">
                <div class="search-header-row">
                    <label class="input-label" for="ingredientInput">냉장고에 뭐가 있나요?</label>
                    <div class="match-toggle">
                        <button class="match-opt active" data-mode="or">하나라도</button>
                        <button class="match-opt" data-mode="and">모두 포함</button>
                    </div>
                </div>
                <div class="tag-input-area">
                    <div id="tags" class="tags"></div>
                    <input type="text" id="ingredientInput" placeholder="재료를 입력하고 Enter" autocomplete="off">
                    <div id="autocompleteList" class="autocomplete-list" style="display:none"></div>
                </div>

                <!-- Recent Searches -->
                <div id="recentSearches" class="recent-searches" style="display:none"></div>

                <div class="quick-tags">
                    <div class="quick-tags-header">
                        <span class="quick-label">🥬 재료</span>
                        <button id="editQuickToggle" class="edit-quick-toggle">✏️ 편집</button>
                    </div>
                    <div id="quickButtons" class="quick-buttons"></div>
                    <div class="quick-tags-header" style="margin-top:8px">
                        <span class="quick-label">🫗 소스 · 양념</span>
                    </div>
                    <div id="quickSauceButtons" class="quick-buttons"></div>
                    <div id="addQuickForm" class="add-quick-form" style="display:none">
                        <input type="text" id="qIngName" placeholder="재료 이름" class="ch-input" style="flex:2">
                        <div class="emoji-dropdown">
                            <button type="button" id="emojiToggle" class="emoji-toggle">🍴</button>
                            <div id="emojiList" class="emoji-list" style="display:none">
                                <button type="button" class="emoji-opt" data-emoji="🍴">🍴</button>
                                <button type="button" class="emoji-opt" data-emoji="🥩">🥩</button>
                                <button type="button" class="emoji-opt" data-emoji="🐟">🐟</button>
                                <button type="button" class="emoji-opt" data-emoji="🦐">🦐</button>
                                <button type="button" class="emoji-opt" data-emoji="🥬">🥬</button>
                                <button type="button" class="emoji-opt" data-emoji="🧅">🧅</button>
                                <button type="button" class="emoji-opt" data-emoji="🥕">🥕</button>
                                <button type="button" class="emoji-opt" data-emoji="🍚">🍚</button>
                                <button type="button" class="emoji-opt" data-emoji="🍜">🍜</button>
                                <button type="button" class="emoji-opt" data-emoji="🧀">🧀</button>
                                <button type="button" class="emoji-opt" data-emoji="🥛">🥛</button>
                                <button type="button" class="emoji-opt" data-emoji="🥚">🥚</button>
                                <button type="button" class="emoji-opt" data-emoji="🌶️">🌶️</button>
                                <button type="button" class="emoji-opt" data-emoji="🍗">🍗</button>
                                <button type="button" class="emoji-opt" data-emoji="🥫">🥫</button>
                                <button type="button" class="emoji-opt" data-emoji="🫘">🫘</button>
                            </div>
                        </div>
                        <select id="qIngSection" class="ch-input" style="flex:1.2;min-width:120px;font-size:0.9rem;padding:0.55rem 0.75rem">
                            <option value="ingredients">🥬 재료</option>
                            <option value="sauces">🫗 소스·양념</option>
                        </select>
                        <button id="addQuickBtn" class="add-channel-btn">추가</button>
                    </div>
                </div>

                <div class="search-actions">
                    <button id="searchBtn" class="search-btn" disabled>
                        <span class="search-btn-text">🔍 레시피 찾기</span>
                    </button>
                    <button id="youtubeBtn" class="youtube-btn" disabled>
                        ▶ 유튜브
                    </button>
                </div>
            </section>

            <section id="results" class="results-section" style="display:none">
                <div class="results-header">
                    <h2 id="resultsTitle">📋 검색 결과</h2>
                    <div class="results-controls">
                        <select id="sortSelect" class="sort-select">
                            <option value="match">일치율순</option>
                            <option value="popular">인기순</option>
                            <option value="newest">최신순</option>
                            <option value="quick">간단한순</option>
                        </select>
                        <div id="youtubeLink" class="youtube-link"></div>
                    </div>
                </div>
                <div id="recipeCards" class="recipe-cards"></div>
                <div id="pagination" class="pagination"></div>
            </section>

            <section class="channels-section">
                <div class="channels-header"><h2>📺 추천 요리 유튜버</h2></div>
                <div id="channelsGrid" class="channels-grid"></div>
            </section>

            <section id="emptyState" class="empty-state" style="display:none">
                <div class="empty-icon">🍳</div>
                <p>재료를 입력하면 만들 수 있는 요리를 찾아드려요</p>
            </section>
        </main>

        <footer class="footer">
            <p>레시피 출처: <a href="https://www.10000recipe.com" target="_blank">만개의레시피</a> · <a href="https://chef-choice.tistory.com" target="_blank">뚝딱이형</a></p>
        </footer>
    </div>

    <!-- Recipe Detail Modal -->
    <div id="recipeModal" class="recipe-modal" style="display:none">
        <div class="modal-dialog">
            <button class="modal-close">&times;</button>
            <div id="recipeModalContent" class="modal-content"></div>
        </div>
    </div>

    <!-- Shopping Sidebar -->
    <div id="shoppingOverlay" class="shopping-overlay"></div>
    <aside id="shoppingSidebar" class="shopping-sidebar">
        <div class="sidebar-header">
            <h2>🛒 장보기 목록</h2>
            <button id="closeSidebar" class="sidebar-close">&times;</button>
        </div>
        <div class="sidebar-actions">
            <button id="copyShoppingBtn" class="shopping-action-btn">📋 복사</button>
            <button id="clearShoppingBtn" class="shopping-action-btn">🗑 비우기</button>
        </div>
        <div class="sidebar-coupang">
            <div class="coupang-label">🛍️ 쿠팡에서 재료 검색</div>
            <iframe src="https://coupa.ng/cl36SR" width="100%" height="36" frameborder="0" scrolling="no" referrerpolicy="unsafe-url" browsingtopics></iframe>
        </div>
        <div id="shoppingItems" class="shopping-items-sidebar"></div>
        <div id="shoppingEmpty" class="shopping-empty">레시피 카드의 🛒 버튼으로<br>재료를 담아보세요</div>
    </aside>

    <script src="js/app.js"></script>
</body>
</html>
