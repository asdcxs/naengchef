name: Daily Recipe Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run crawler
        run: python crawler.py --update

      - name: Export JSON
        run: |
          python -c "
          import json, sqlite3
          conn = sqlite3.connect('recipes.db')
          conn.row_factory = sqlite3.Row
          rows = conn.execute('SELECT * FROM recipes ORDER BY id').fetchall()
          conn.close()
          recipes = []
          for r in rows:
              recipes.append({
                  'id':r['id'],'t':r['title'],'i':r['ingredients'],'th':r['thumbnail_url'] or '',
                  'u':r['source_url'],'s':r['servings'] or '','ct':r['cook_time'] or '',
                  'd':r['difficulty'] or '','tg':r['tags'] or '','st':r['source_type'] or ''
              })
          with open('recipes.json','w',encoding='utf-8') as f:
              json.dump(recipes,f,ensure_ascii=False,separators=(',',':'))
          print(f'{len(recipes)} recipes exported')
          "

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recipes.json recipes.db
          git diff --cached --quiet || git commit -m "auto: $(date +%Y-%m-%d) 레시피 업데이트"
          git push
